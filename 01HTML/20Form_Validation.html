<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
        }

        input {
            height: 100%;
            outline: none;
            border-radius: 0;
            border: 1px solid gray;
            padding-left: 10px;

        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
        }

        select {
            height: 100%;
            outline: none;
            border-radius: 0;
            border: 1px solid gray;
            width: 100%;
        }

        a {
            text-decoration: none;
            color: black;
        }

        .btn {
            min-width: 80px;
            text-align: center;
            border: 1px solid lightgray;
            height: 100%;
            line-height: 35px;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .btn:hover {
            opacity: 1;
        }

        .btn-submit {
            width: 100%;
            border: 0;
            background-color: royalblue;
            color: white;
            font-size: 1.1rem;
            height: 40px;
        }

        form {
            width: 400px;
            border: 1px solid;
            margin: 50px auto;
            padding: 10px;
        }

        form>.row {
            margin-bottom: 10px;
            display: flex;
            justify-content: left;
            align-items: center;
            gap: 5px;
            height: 35px;
        }

        form h2 {
            display: block;
            width: 100%;
            height: 50px;
            text-align: center;
            font-size: 1.7rem;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        form>.row>label {
            display: block;
            min-width: 100px;
            height: 100%;
            line-height: 35px;
        }
    </style>

</head>

<body>
    <!-- 
        form : 사용자로부터 특정정보를 받아 서버로 전달하는데 사용되는 태그
        action Attribute : 전달받는 서버 URI
        method Attribute : 서버로 요청하는 방식
            - GET        : 사용자 요청 정보를 Query String으로 전달(Default)
            - POST       : 사용자 요청 정보를 Request body(Payload) 로 전달
            - PUT        :
            - PATCH      : 
            - DELETE     : 
    -->

    <form action="/test.jsp" method="get">
        <div class="">
            <h2>회원가입</h2>
        </div>
        <div class="row">
            <label>아이디</label>
            <input name="userid" type="text" required />
            <a class="btn" href="javascript:void(0)">중복확인</a>
        </div>
        <div class="row">
            <label>비밀번호</label>
            <input name="password" type="password" required pattern="(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}"
                title="최소 8자이상 영문대/소문자,숫자를 섞어 입력하세요" />
            <!-- 
                ^(?=.*[a-zA-Z])(?=.*[0-9]).{8,25}$
                ^ : 시작
                $ : 끝
                () : 하나의식(묶는단위)
                {8,25} : 길이(8자이상 25자 이하)
                ?= : 전방탐색
                . : 모든문자(길이 1)
                * : 모든문자(길이 제한 없음)
                [a-zA-Z] : 알파벳 a-z or A-Z 까지 탐색
                [0-9] : 숫자 0-9 까지 탐색
            -->
        </div>
        <div class="row">
            <label>비밀번호 확인</label>
            <input name="re-password" type="password" />
        </div>
        <div class="row">
            <label>이름</label>
            <input name="username" type="text" />
        </div>
        <div class="row">
            <label>우편번호</label>
            <input name="zipcode" type="text" />
            <a class="btn" href="javascript:void(0)">검색</a>
        </div>
        <!-- 
            disabled    : 서버전송 대상에서 제외 , 입력불가
            readonly    : 서버전송 대상에 포함   , 입력불가
        -->
        <div class="row">
            <label>기본주소</label>
            <input name="addr1" type="text" readonly />
        </div>
        <div class="row">
            <label>상세주소</label>
            <input name="addr2" type="text" disabled />
        </div>
        <div class="row">
            <label>휴대전화</label>
            <select>
                <option value="" selected>010</option>
                <option value="">011</option>
            </select>
            <input type="text" />
            <input type="text" />
        </div>
        <div class="row">
            <label>연락처</label>
            <select>
                <option value="" selected>053</option>
                <option value="">055</option>
                <option value="">02</option>
            </select>
            <input type="text" />
            <input type="text" />
        </div>
        <div class="row">
            <label>이메일</label>
            <input type="text" />
            <select>
                <option value="" selected>@naver.com</option>
                <option value="">@outlook.co.kr</option>
                <option value="">@google.com</option>
            </select>
        </div>
        <div class="row">
            <label>생년월일</label>
            <input name="birth" value="a" type="radio" /> 양
            <input name="birth" value="b" type="radio" /> 음
        </div>

        <div class="row">
            <select>
                <option value="" selected>2025</option>
                <option value="">2024</option>
                <option value="">2023</option>
            </select>
            <select>
                <option value="" selected>12</option>
                <option value="">11</option>
                <option value="">10</option>
            </select>
            <select>
                <option value="" selected>01</option>
                <option value="">02</option>
                <option value="">03</option>
            </select>
        </div>
        <hr />
        <div class="row">
            <input id="email-recv" name="email_recv" type="checkbox" />
            <label for="email-recv">이메일 수신에 동의합니다.</label>
        </div>
        <div class="row">
            <input id="sms-recv" name="sms_recv" type="checkbox" />
            <label for="sms-recv">문자메시지 수신에 동의합니다.</label>
        </div>
        <div class="row">
            <input class="btn btn-submit" type="submit" value="회원가입" />
        </div>

    </form>


</body>

</html>

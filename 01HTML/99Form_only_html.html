<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>



</head>

<body>


    <div class="wrapper">
        <div>
            <h2>NAVER</h2>
        </div>

        <form action="">
            <!-- form-header -->
            <div>
                <label>실명 인증된 아이디로 가입</label>
                <input type="checkbox" />
            </div>
            <!-- form-main-section-01 -->
            <div>
                <div>
                    <label for="">아이디</label>
                    <input type="text" name="userid" />
                </div>
                <div>
                    <label for="">비밀번호</label>
                    <input type="password" name="password" />
                </div>
                <div>
                    <label for="">이메일</label>
                    <input type="email" name="email" />
                </div>
            </div>
            <!-- form-main-section-02 -->
            <div>
                <div>
                    <label>이름</label>
                    <input type="text" name="username" />
                </div>
                <div>
                    <label>생년월일 8자리</label>
                    <input type="text" name="birth" />
                </div>
                <div>
                    <div>
                        <label>남자</label>
                        <input type="radio" name="gender" />
                    </div>
                    <div>
                        <label>여자</label>
                        <input type="radio" name="gender" />
                    </div>
                    <div>
                        <label>선택안함</label>
                        <input type="radio" name="gender" />
                    </div>
                </div>
                <div>
                    <label></label>
                    <select>
                        <option value="82">대한민국 +82</option>
                    </select>
                </div>
                <div>
                    <label>휴대전화번호</label>
                    <input type="text" name="phone" />
                </div>
            </div>
            <!-- form-footer -->
            <div>
                <button>인증요청</button>
                <input type="submit" value="인증요청" />
            </div>
        </form>

    </div>
</body>

</html>
